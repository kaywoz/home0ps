name: deploy DNS via OpenTofu

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # (Optional) Use a specific environment if needed, otherwise leave it off.
    env:
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      S3_KEY: ${{ secrets.S3_KEY }}

      AWS_ACCESS_KEY_ID: ${{ secrets.HETZNER_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.HETZNER_SECRET_ACCESS_KEY }}

      TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}

      TF_VAR_netbird_token: ${{ secrets.NETBIRD_TOKEN }}

    defaults:
      run:
        working-directory: iac

    steps:
      # 1. Update the Checkout Action (If a newer version is available)
      - name: Checkout repository
        uses: actions/checkout@v4 # v4 was already good, but we check for updates
      
      # 2. Update the OpenTofu Setup Action (CRITICAL FIX)
      - name: Install OpenTofu
        uses: opentofu/setup-opentofu@v1 # Check GitHub Marketplace for latest major version!

      # The rest of your steps remain the same, as they are syntactically correct.
      - name: Initialize backend
        run: tofu init

      - name: Validate configuration
        run: tofu validate

      - name: Plan changes
        run: tofu plan -no-color

      - name: Apply changes
        if: github.ref == 'refs/heads/main'
        run: tofu apply -auto-approve -no-color
