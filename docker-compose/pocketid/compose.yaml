services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: sh-pocketid-0101
    restart: unless-stopped
    environment:
      - ENCRYPTION_KEY=${POCKETID_ENCRYPTION_KEY}
      - MAXMIND_LICENSE_KEY=${POCKETID_MAXMIND_LICENSE_KEY}
    ports:
      - 1411:1411
    volumes:
      - "/opt/docker/projects/data:/app/data"
    # Optional healthcheck    
    networks:
      - pocketid
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s      
  networks:
    pocketid-net:
      driver: bridge

