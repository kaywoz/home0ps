services:
  pocket-id:
    image: ghcr.io/pocket-id/pocket-id:v2
    container_name: sh-pocketid-0101
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: "f5T82V14QSh0m2iIaTdDHtzfbmES+PmjbucKW5ZARTk="
    ports:
      - 1411:1411
    volumes:
      - "./data:/app/data"
    # Optional healthcheck
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
