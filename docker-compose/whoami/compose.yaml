services:
  whoami:
    image: denga/whoami:latest
    container_name: sh-whoami-0101
    ports:
      - "8085:80"
    environment:
      - WHOAMI_NAME=${WHOAMI_WHOAMI_NAME}
     # - env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
