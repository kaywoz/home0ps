
services:
  whoami:
    image: denga/whoami:latest
    container_name: sh-whoami-0101
    ports:
      - "8085:80"
    environment:
      - WHOAMI_NAME=${WHOAMI_WHOAMI_NAME}
    restart: unless-stopped
    networks:
      - whoami
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost"]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s

networks:
  whoami:
    driver: bridge
