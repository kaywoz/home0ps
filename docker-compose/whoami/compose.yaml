services:
  whoami:
    image: denga/whoami:latest
    ports:
      - "8085:80"
    environment:
      - WHOAMI_NAME=${WHOAMI_NAME}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
